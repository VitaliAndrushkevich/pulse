name: Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  verify-mcp:
    name: MCP Server Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: mcp/go.mod
          cache-dependency-path: mcp/go.sum

      - name: Download dependencies
        working-directory: mcp
        run: go mod download

      - name: Build MCP server
        working-directory: mcp
        run: CGO_ENABLED=0 go build -o /dev/null ./main.go

      - name: Run MCP tests
        working-directory: mcp
        run: go test -race ./...

  docker-latest:
    name: Docker Latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: repo
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push latest
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
