openapi: 3.0.3
info:
  title: Pulse API
  description: Self-hosted uptime monitoring platform API.
  version: 1.0.0
  contact:
    name: Pulse

servers:
  - url: /api/v1
    description: API v1

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      operationId: login
      summary: Authenticate user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors:
    get:
      operationId: listMonitors
      summary: List all monitors
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: type
          in: query
          description: Filter by monitor type
          schema:
            type: string
            enum: [http, http3, tcp, udp, websocket, grpc, dns, icmp, smtp, quic]
        - name: tag
          in: query
          description: >
            Filter by tags in key:value format. Multiple tag parameters use AND semantics
            (monitor must have ALL specified tags). Example: ?tag=env:prod&tag=team:infra
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: Paginated list of monitors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMonitor
      summary: Create a new monitor
      tags: [Monitors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorRequest"
            example:
              name: "gRPC Health Check"
              type: "grpc"
              target: "grpc.example.com:443"
              interval_seconds: 30
              timeout_seconds: 10
              settings:
                service_method: "grpc.health.v1.Health/Check"
                tls_mode: "tls"
                ssl_expiry_threshold: 30
                metadata:
                  authorization: "Bearer token123"
                expected_statuses: [0]
      responses:
        "201":
          description: Monitor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "400":
          description: >
            Validation error. Possible error codes: VALIDATION_ERROR (general field
            validation failure), INVALID_TAGS (tag constraint violation),
            INVALID_RETENTION_PERIOD (history_retention_days outside range 1–365).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}:
    get:
      operationId: getMonitor
      summary: Get a monitor by ID
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "200":
          description: Monitor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: putMonitor
      summary: Create or update a monitor (idempotent)
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutMonitorRequest"
      responses:
        "200":
          description: Monitor created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "400":
          description: >
            Validation error. Possible error codes: VALIDATION_ERROR (general field
            validation failure), INVALID_TAGS (tag constraint violation),
            INVALID_RETENTION_PERIOD (history_retention_days outside range 1–365).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteMonitor
      summary: Delete a monitor
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "204":
          description: Monitor deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/history:
    get:
      operationId: getMonitorHistory
      summary: Get check history for a monitor
      description: >
        Returns check history for the specified monitor within the given time range.
        When `step` is provided (or auto-calculated for ranges > 24h), the response
        contains aggregated data points in `aggregated_points` instead of raw `points`.
        The time range is clamped to the monitor's configured retention period; if
        clamping occurs, `truncated` is set to true in the response.
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - name: from
          in: query
          description: Start of time range (RFC 3339). Defaults to 24h ago.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of time range (RFC 3339). Defaults to now.
          schema:
            type: string
            format: date-time
        - name: step
          in: query
          description: >
            Aggregation interval in seconds. When provided, responses are
            aggregated into time buckets of the specified duration. If omitted
            and the requested range exceeds 24 hours, a step is auto-calculated
            as ceil(range_seconds / 1000) to cap the response at ~1000 points.
          schema:
            type: integer
            minimum: 60
            maximum: 86400
      responses:
        "200":
          description: Check history points (raw or aggregated depending on step)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /monitors/{id}/incidents:
    get:
      operationId: listMonitorIncidents
      summary: List incidents for a specific monitor
      tags: [Incidents]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of incidents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/stats:
    get:
      operationId: getMonitorStats
      summary: Get uptime statistics, SSL info, and last error for a monitor
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "200":
          description: Monitor statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorStatsResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/proto-source:
    post:
      operationId: uploadProtoSource
      summary: Upload proto source files
      description: >
        Uploads .proto files or a compiled FileDescriptorSet (.desc) for the monitor.
        Replaces any existing proto source. Maximum total upload size is 5MB.
      tags: [Proto Source]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: ".proto files or a single .desc (FileDescriptorSet) file"
      responses:
        "200":
          description: Proto source uploaded and parsed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtoSourceMeta"
        "400":
          description: >
            Upload validation error. Possible error codes:
            PROTO_PARSE_ERROR (invalid .proto syntax or FileDescriptorSet binary),
            PROTO_UNRESOLVED_IMPORTS (.proto files reference imports not in the upload set),
            PROTO_SIZE_EXCEEDED (upload exceeds 5MB limit).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      operationId: getProtoSource
      summary: Get proto source metadata
      description: Returns metadata about the proto source configured for this monitor.
      tags: [Proto Source]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "200":
          description: Proto source metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtoSourceMeta"
        "404":
          description: >
            Not found. Possible error codes:
            PROTO_SOURCE_NOT_FOUND (no proto source configured for this monitor),
            MONITOR_NOT_FOUND (monitor ID doesn't exist).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteProtoSource
      summary: Delete proto source
      description: >
        Removes the proto source from the monitor. If payload_format was proto_json,
        it is reset to raw. This operation is idempotent.
      tags: [Proto Source]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "200":
          description: Proto source deleted (or did not exist)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/proto-source/reflect:
    post:
      operationId: reflectProtoSource
      summary: Trigger Server Reflection
      description: >
        Connects to the monitor's gRPC target and discovers schemas via Server Reflection.
        Replaces any existing proto source on success. The operation has a 10-second timeout.
      tags: [Proto Source]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      requestBody:
        description: Empty body
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Reflection succeeded, proto source updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtoSourceMeta"
        "400":
          description: >
            Reflection error. Possible error codes:
            REFLECTION_UNAVAILABLE (target server doesn't support Server Reflection),
            REFLECTION_NO_SERVICES (reflection found only the reflection service itself).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: >
            Cannot reach target server. Error code: REFLECTION_CONNECTION_FAILED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: >
            Reflection timed out. Error code: REFLECTION_TIMEOUT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /grpc/reflect:
    post:
      operationId: adHocReflect
      summary: Ad-hoc Server Reflection
      description: >
        Performs gRPC Server Reflection against an arbitrary target without requiring a saved monitor.
        Used during monitor creation to discover services before the monitor exists in the database.
        The operation has a 10-second timeout. Results are not persisted.
      tags: [Proto Source]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target
              properties:
                target:
                  type: string
                  description: "gRPC target address (host:port)"
                  example: "api.example.com:443"
                tls_mode:
                  type: string
                  enum: [plaintext, tls, tls_skip_verify]
                  default: tls
                  description: "TLS mode for the connection"
      responses:
        "200":
          description: Reflection succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtoSourceMeta"
        "400":
          description: >
            Reflection error. Possible error codes:
            INVALID_REQUEST (missing or empty target),
            REFLECTION_UNAVAILABLE (target doesn't support Server Reflection),
            REFLECTION_NO_SERVICES (no discoverable services found).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: >
            Cannot reach target server. Error code: REFLECTION_CONNECTION_FAILED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: >
            Reflection timed out. Error code: REFLECTION_TIMEOUT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /grpc/parse-proto:
    post:
      operationId: adHocParseProto
      summary: Ad-hoc proto file parsing
      description: >
        Parses uploaded .proto or .desc/.bin files without requiring a saved monitor.
        Returns service metadata for method selection during monitor creation.
        Results are not persisted. Maximum upload size is 5MB total.
      tags: [Proto Source]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >
                    One or more .proto, .desc, or .bin files to parse.
                    Maximum 5MB total.
      responses:
        "200":
          description: Proto files parsed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtoSourceMeta"
        "400":
          description: >
            Parse error. Possible error codes:
            PROTO_PARSE_ERROR (invalid proto content or unsupported file type),
            PROTO_SIZE_EXCEEDED (upload exceeds 5MB limit),
            PROTO_UNRESOLVED_IMPORTS (proto files have unresolved import dependencies).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/credentials:
    post:
      operationId: createMonitorCredential
      summary: Create a credential for a monitor
      description: >
        Creates a new authentication credential for the specified monitor.
        The credential value is encrypted at rest and never returned in subsequent API responses.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorCredentialRequest"
      responses:
        "201":
          description: Credential created (secret values not returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorCredential"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listMonitorCredentials
      summary: List credentials for a monitor
      description: >
        Returns metadata for all credentials associated with the specified monitor.
        Secret values are never included in the response.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "200":
          description: List of credential metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorCredentialListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /monitors/{id}/credentials/{credentialId}:
    put:
      operationId: updateMonitorCredential
      summary: Update a monitor credential
      description: >
        Updates an existing credential. Only the provided fields are updated.
        The new secret value is encrypted at rest and never returned in the response.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/CredentialID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonitorCredentialRequest"
      responses:
        "200":
          description: Credential updated (secret values not returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorCredential"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMonitorCredential
      summary: Delete a monitor credential
      description: >
        Permanently removes a credential from the monitor. The monitor will stop
        including this credential's authentication in subsequent health-check requests.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/CredentialID"
      responses:
        "204":
          description: Credential deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tags:
    get:
      operationId: listTagKeys
      summary: List all distinct tag keys
      description: Returns all distinct tag keys currently in use across all monitors. Used for frontend autocomplete.
      tags: [Tags]
      responses:
        "200":
          description: List of distinct tag keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagKeysResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tags/{key}:
    get:
      operationId: listTagValues
      summary: List distinct values for a tag key
      description: Returns all distinct values associated with the specified tag key across all monitors. Used for frontend autocomplete.
      tags: [Tags]
      parameters:
        - name: key
          in: path
          required: true
          description: Tag key to list values for
          schema:
            type: string
            pattern: "^[a-z][a-z0-9_-]{0,63}$"
      responses:
        "200":
          description: List of distinct values for the tag key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagValuesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /incidents:
    get:
      operationId: listIncidents
      summary: List all incidents
      tags: [Incidents]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          description: Filter by status (open for unresolved only)
          schema:
            type: string
            enum: [open]
      responses:
        "200":
          description: Paginated list of incidents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tokens:
    get:
      operationId: listTokens
      summary: List API tokens
      tags: [Tokens]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createToken
      summary: Create a new API token (raw value returned once)
      tags: [Tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token created (raw value shown only at creation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /tokens/{id}:
    delete:
      operationId: revokeToken
      summary: Revoke an API token
      tags: [Tokens]
      parameters:
        - $ref: "#/components/parameters/TokenID"
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "404":
          $ref: "#/components/responses/NotFound"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      summary: Get aggregated dashboard health overview
      description: >
        Returns a pre-aggregated operational health summary for the dashboard.
        Includes global health score, status distribution, active incidents,
        top latency monitors, SSL expiry warnings, uptime heatmap, and recent
        state transition events. All sub-queries run in parallel; partial
        failures are reflected via the `partial_data` flag in the health score.
      tags: [Dashboard]
      responses:
        "200":
          description: Aggregated dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/channels:
    get:
      operationId: listNotificationChannels
      summary: List notification channels
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of notification channels
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannelListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createNotificationChannel
      summary: Create a notification channel
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationChannelRequest"
      responses:
        "201":
          description: Channel created
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/channels/{id}:
    get:
      operationId: getNotificationChannel
      summary: Get a notification channel by ID
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationChannelID"
      responses:
        "200":
          description: Channel details (header values redacted)
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannel"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateNotificationChannel
      summary: Update a notification channel (full replacement)
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationChannelID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationChannelRequest"
      responses:
        "200":
          description: Channel updated
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationChannel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteNotificationChannel
      summary: Delete a notification channel
      description: Deletes the channel and cascades to all associated bindings.
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationChannelID"
      responses:
        "204":
          description: Channel deleted
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/notification-bindings:
    get:
      operationId: listNotificationBindings
      summary: List notification bindings for a monitor
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of bindings for the monitor
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationBindingListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createNotificationBinding
      summary: Create a notification binding for a monitor
      description: >
        Binds a notification channel to a monitor with specific trigger conditions.
        Each channel-monitor pair can have at most one binding.
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationBindingRequest"
      responses:
        "201":
          description: Binding created
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationBinding"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A binding already exists for this channel-monitor pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/notification-bindings/{bindingId}:
    put:
      operationId: updateNotificationBinding
      summary: Update a notification binding
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/BindingID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationBindingRequest"
      responses:
        "200":
          description: Binding updated
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationBinding"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteNotificationBinding
      summary: Delete a notification binding
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/BindingID"
      responses:
        "204":
          description: Binding deleted
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/template-variables:
    get:
      operationId: getTemplateVariables
      summary: Get available webhook template variables
      description: >
        Returns a static reference of all available template variables that can be
        used in webhook body templates. Variables are grouped by their dot-notation
        prefix (monitor, Incident, top-level).
      tags: [Notifications]
      responses:
        "200":
          description: Template variable reference grouped by prefix
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateVariablesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/channels/{id}/test:
    post:
      operationId: testNotificationChannel
      summary: Send a test notification
      description: >
        Dispatches a test notification through the specified channel using sample
        data. Returns the delivery result synchronously within a 10s timeout.
        Test notifications do NOT create delivery_log records and are NOT queued
        for retry on failure.
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationChannelID"
      responses:
        "200":
          description: Test result (success or failure with error detail)
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotificationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "504":
          description: Test delivery timed out (10s exceeded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/smtp-settings:
    get:
      operationId: getSMTPSettings
      summary: Get SMTP configuration status
      description: >
        Returns the current SMTP configuration. The raw password is never returned;
        only a boolean `password_set` indicator is included. If SMTP is not
        configured, returns `{ "configured": false }`.
      tags: [Notifications]
      responses:
        "200":
          description: SMTP configuration (password redacted)
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SMTPSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateSMTPSettings
      summary: Create or update SMTP settings
      description: >
        Creates or updates the singleton SMTP configuration. The password is
        encrypted at rest with AES-256-GCM. If password is omitted, the existing
        password is preserved.
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SMTPSettingsRequest"
      responses:
        "200":
          description: SMTP settings saved
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SMTPSettingsResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteSMTPSettings
      summary: Remove SMTP settings
      description: >
        Deletes the SMTP configuration row, disabling email notifications.
      tags: [Notifications]
      responses:
        "204":
          description: SMTP settings deleted
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/channels/{id}/delivery-logs:
    get:
      operationId: listChannelDeliveryLogs
      summary: List delivery logs for a notification channel
      description: >
        Returns a paginated list of delivery log entries for the specified
        notification channel, ordered by created_at descending.
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationChannelID"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of delivery logs
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryLogListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/smtp-settings/test:
    post:
      operationId: testSMTPConnection
      summary: Test SMTP connectivity
      description: >
        Tests SMTP connectivity by establishing a TCP connection, sending EHLO,
        and optionally authenticating. Uses the currently saved SMTP settings.
        Returns the result synchronously.
      tags: [Notifications]
      responses:
        "200":
          description: Test result (success or failure with error detail)
          headers:
            X-Request-ID:
              $ref: "#/components/headers/X-Request-ID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SMTPTestResponse"
        "400":
          description: SMTP settings are not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or API Token

  parameters:
    Page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Items per page (max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    MonitorID:
      name: id
      in: path
      required: true
      description: Monitor UUID
      schema:
        type: string
        format: uuid
    CredentialID:
      name: credentialId
      in: path
      required: true
      description: Credential UUID
      schema:
        type: string
        format: uuid
    TokenID:
      name: id
      in: path
      required: true
      description: Token UUID
      schema:
        type: string
        format: uuid
    NotificationChannelID:
      name: id
      in: path
      required: true
      description: Notification channel UUID
      schema:
        type: string
        format: uuid
    BindingID:
      name: bindingId
      in: path
      required: true
      description: Notification binding UUID
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  headers:
    X-Request-ID:
      description: Unique request identifier for tracing and correlation
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: >
                Machine-readable error code. Known codes include:
                VALIDATION_ERROR - general field validation failure;
                TEMPLATE_ERROR - webhook template parsing or unknown variable error;
                NOT_FOUND - referenced resource does not exist;
                CONFLICT - duplicate resource (e.g., binding for same channel-monitor pair);
                TIMEOUT - operation exceeded time limit;
                DB_ERROR - internal database error;
                INVALID_TAGS - tag validation failed (invalid key format, value too long,
                too many tags, duplicate key-value pairs, or reserved prefix usage);
                INVALID_RETENTION_PERIOD - history_retention_days value is outside the
                valid range of 1–365 or is not a valid integer;
                INVALID_STEP - step query parameter is outside the valid range of 60–86400;
                PROTO_PARSE_ERROR - invalid .proto syntax or FileDescriptorSet binary;
                PROTO_UNRESOLVED_IMPORTS - .proto files reference imports not in the upload set;
                PROTO_SIZE_EXCEEDED - upload exceeds 5MB limit;
                PROTO_PAYLOAD_SIZE_EXCEEDED - Proto JSON payload exceeds 1MB;
                PROTO_VALIDATION_ERROR - Proto JSON doesn't conform to message schema;
                PROTO_SOURCE_REQUIRED - payload_format=proto_json but no proto source configured;
                PROTO_SOURCE_NOT_FOUND - GET proto source when none exists;
                REFLECTION_UNAVAILABLE - target server doesn't support Server Reflection;
                REFLECTION_TIMEOUT - reflection operation exceeded 10s;
                REFLECTION_CONNECTION_FAILED - cannot reach target gRPC server;
                REFLECTION_NO_SERVICES - reflection found only the reflection service itself
            message:
              type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, expires_at]
      properties:
        token:
          type: string
          description: JWT token
        expires_at:
          type: string
          format: date-time

    Monitor:
      type: object
      required:
        - id
        - name
        - type
        - target
        - interval_seconds
        - timeout_seconds
        - status
        - state
        - settings
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [http, http3, tcp, udp, websocket, grpc, dns, icmp, smtp, quic]
        target:
          type: string
        interval_seconds:
          type: integer
        timeout_seconds:
          type: integer
        status:
          type: string
          enum: [active, paused]
        state:
          type: string
          enum: [up, down, unknown]
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        next_check_at:
          type: string
          format: date-time
          nullable: true
        settings:
          type: object
          description: "Type-specific settings. For type=http/http3/quic, see HTTPSettings. For type=grpc, see GRPCSettings. For type=dns, see DNSSettings. For type=icmp, see ICMPSettings. For type=smtp, see SMTPSettings."
        history_retention_days:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
          default: 30
          description: >
            Number of days to retain check history data for this monitor.
            When not specified, defaults to 30 days.
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Key-value tags associated with this monitor
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMonitorRequest:
      type: object
      required: [name, type, target]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [http, http3, tcp, udp, websocket, grpc, dns, icmp, smtp, quic]
        target:
          type: string
          description: >
            Monitor target address. Smart normalization is applied based on type:
            http/http3 — bare domain gets "https://" prefix (e.g., "example.com" → "https://example.com");
            websocket — bare domain gets "wss://" prefix;
            tcp/udp/grpc — must be host:port without scheme.
            dns — domain name only (trailing dot stripped);
            icmp — hostname or IP address;
            smtp — hostname or host:port;
            quic — bare domain gets "https://" prefix, operates over UDP/QUIC transport.
        interval_seconds:
          type: integer
          default: 60
        timeout_seconds:
          type: integer
          default: 10
        status:
          type: string
          enum: [active, paused]
          default: active
        settings:
          type: object
          description: "Type-specific settings. For type=http/http3/quic, see HTTPSettings. For type=grpc, see GRPCSettings. For type=dns, see DNSSettings. For type=icmp, see ICMPSettings. For type=smtp, see SMTPSettings."
        history_retention_days:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
          default: 30
          description: >
            Number of days to retain check history data for this monitor.
            When not specified, defaults to 30 days. Values outside the range
            1–365 will result in an INVALID_RETENTION_PERIOD error.
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Optional key-value tags to associate with the monitor (max 20)

    PutMonitorRequest:
      type: object
      required: [name, type, target]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [http, http3, tcp, udp, websocket, grpc, dns, icmp, smtp, quic]
        target:
          type: string
          description: >
            Monitor target address. Smart normalization is applied based on type:
            http/http3 — bare domain gets "https://" prefix (e.g., "example.com" → "https://example.com");
            websocket — bare domain gets "wss://" prefix;
            tcp/udp/grpc — must be host:port without scheme.
            dns — domain name only (trailing dot stripped);
            icmp — hostname or IP address;
            smtp — hostname or host:port;
            quic — bare domain gets "https://" prefix, operates over UDP/QUIC transport.
        interval_seconds:
          type: integer
          default: 60
        timeout_seconds:
          type: integer
          default: 10
        status:
          type: string
          enum: [active, paused]
          default: active
        settings:
          type: object
          description: "Type-specific settings. For type=http/http3/quic, see HTTPSettings. For type=grpc, see GRPCSettings. For type=dns, see DNSSettings. For type=icmp, see ICMPSettings. For type=smtp, see SMTPSettings."
        history_retention_days:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
          default: 30
          description: >
            Number of days to retain check history data for this monitor.
            When not specified, defaults to 30 days. Values outside the range
            1–365 will result in an INVALID_RETENTION_PERIOD error.
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Optional key-value tags to associate with the monitor (max 20)

    MonitorListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Monitor"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    HistoryPoint:
      type: object
      required: [state, checked_at]
      properties:
        state:
          type: string
          enum: [up, down]
        latency_ms:
          type: integer
          nullable: true
        status_code:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true
        ssl_days_remaining:
          type: integer
          nullable: true
          description: Days until SSL certificate expires (HTTPS monitors only)
        checked_at:
          type: string
          format: date-time

    HistoryResponse:
      type: object
      required: [monitor_id, from, to, points]
      properties:
        monitor_id:
          type: string
          format: uuid
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        truncated:
          type: boolean
          description: >
            Indicates whether the requested time range was clamped to the
            monitor's retention boundary. When true, the `from` value in this
            response reflects the clamped start time, not the originally requested one.
        step:
          type: integer
          description: >
            The aggregation interval used (in seconds). Present when the response
            contains aggregated data points (either from an explicit `step` parameter
            or auto-calculated for ranges exceeding 24 hours).
        points:
          type: array
          items:
            $ref: "#/components/schemas/HistoryPoint"
          description: >
            Raw check result data points. Present when no aggregation is applied
            (range ≤ 24h and no explicit step parameter).
        aggregated_points:
          type: array
          items:
            $ref: "#/components/schemas/AggregatedHistoryPoint"
          description: >
            Downsampled/aggregated data points. Present when aggregation is applied
            (explicit step parameter or auto-calculated for ranges > 24h).

    AggregatedHistoryPoint:
      type: object
      description: >
        A single aggregated time bucket summarizing multiple check results.
        Used in place of HistoryPoint when the `step` parameter is active.
      required: [timestamp, check_count, uptime_ratio]
      properties:
        timestamp:
          type: string
          format: date-time
          description: Start time of the aggregation bucket
        min_latency_ms:
          type: integer
          nullable: true
          description: Minimum latency observed in this bucket (null if all checks had no latency)
        max_latency_ms:
          type: integer
          nullable: true
          description: Maximum latency observed in this bucket (null if all checks had no latency)
        avg_latency_ms:
          type: integer
          nullable: true
          description: Average latency observed in this bucket, rounded to nearest integer (null if all checks had no latency)
        check_count:
          type: integer
          minimum: 1
          description: Total number of check results in this bucket
        uptime_ratio:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: >
            Ratio of checks with state "up" to total checks in this bucket,
            expressed as a value between 0.0 and 1.0

    Incident:
      type: object
      required: [id, monitor_id, started_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        monitor_id:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        cause:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    IncidentListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Incident"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    MonitorCredential:
      type: object
      description: >
        Credential metadata for a monitor. Secret values (token, password, header_value,
        encrypted_value) are never included in API responses.
      required: [id, auth_type, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        auth_type:
          type: string
          enum: [bearer, basic, header]
          description: The type of authentication this credential provides
        name:
          type: string
          description: Human-readable label for the credential
        header_name:
          type: string
          nullable: true
          description: Custom header name (only present when auth_type is header)
        username:
          type: string
          nullable: true
          description: Username for basic auth (only present when auth_type is basic)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMonitorCredentialRequest:
      type: object
      required: [auth_type, name]
      properties:
        auth_type:
          type: string
          enum: [bearer, basic, header]
          description: The type of authentication this credential provides
        name:
          type: string
          description: Human-readable label for the credential
        token:
          type: string
          description: Bearer token value (required when auth_type is bearer)
        username:
          type: string
          description: Username for basic auth (required when auth_type is basic)
        password:
          type: string
          description: Password for basic auth (required when auth_type is basic)
        header_name:
          type: string
          description: Custom header name (required when auth_type is header)
        header_value:
          type: string
          description: Custom header value (required when auth_type is header)

    UpdateMonitorCredentialRequest:
      type: object
      properties:
        name:
          type: string
          description: Updated human-readable label for the credential
        token:
          type: string
          description: New bearer token value (for auth_type bearer)
        username:
          type: string
          description: New username for basic auth (for auth_type basic)
        password:
          type: string
          description: New password for basic auth (for auth_type basic)
        header_name:
          type: string
          description: New custom header name (for auth_type header)
        header_value:
          type: string
          description: New custom header value (for auth_type header)

    MonitorCredentialListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MonitorCredential"

    Token:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        expires_at:
          type: string
          format: date-time

    CreateTokenResponse:
      type: object
      required: [token, id, name, created_at]
      properties:
        token:
          type: string
          description: Raw token value (shown only once)
        id:
          type: string
          format: uuid
        name:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    TokenListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Token"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    MonitorStatsResponse:
      type: object
      required: [monitor_id, uptime_24h, uptime_30d]
      properties:
        monitor_id:
          type: string
          format: uuid
        uptime_24h:
          $ref: "#/components/schemas/UptimeWindowStats"
        uptime_30d:
          $ref: "#/components/schemas/UptimeWindowStats"
        ssl:
          $ref: "#/components/schemas/SSLInfo"
        last_error:
          $ref: "#/components/schemas/LastErrorInfo"

    UptimeWindowStats:
      type: object
      required: [total_checks, up_checks, uptime_percent, avg_latency_ms]
      properties:
        total_checks:
          type: integer
        up_checks:
          type: integer
        uptime_percent:
          type: number
          format: float
        avg_latency_ms:
          type: integer

    SSLInfo:
      type: object
      required: [days_remaining, expires_at]
      properties:
        days_remaining:
          type: integer
          description: Days until certificate expires
        expires_at:
          type: string
          format: date
          description: Approximate certificate expiration date

    LastErrorInfo:
      type: object
      required: [error, checked_at]
      properties:
        error:
          type: string
          description: The error message from the last failed check
        checked_at:
          type: string
          format: date-time
          description: When the error was recorded

    GRPCSettings:
      type: object
      required: [service_method, tls_mode]
      properties:
        service_method:
          type: string
          description: "Fully-qualified gRPC service and method in package.Service/Method format"
          example: "grpc.health.v1.Health/Check"
          maxLength: 512
        tls_mode:
          type: string
          enum: [plaintext, tls, tls_skip_verify]
          description: "Connection security mode"
        ssl_expiry_threshold:
          type: integer
          minimum: 1
          maximum: 3650
          description: "Minimum acceptable days until certificate expiry"
        metadata:
          type: object
          additionalProperties:
            type: string
            maxLength: 4096
          maxProperties: 20
          description: "Key-value pairs sent as gRPC request metadata"
        expected_statuses:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 16
          maxItems: 17
          description: "gRPC status codes considered healthy (default: [0] = OK)"
        request_payload:
          type: string
          format: byte
          maxLength: 65536
          description: "Base64-encoded protobuf request message"
        payload_format:
          type: string
          enum: [raw, proto_json]
          default: raw
          description: >
            Payload interpretation mode. "raw" uses base64-encoded bytes (request_payload field),
            "proto_json" uses Proto JSON format with schema validation against the configured
            proto source.

    HTTPSettings:
      type: object
      description: >
        Settings for HTTP/HTTPS monitors (type=http, type=http3).
        All fields are optional with sensible defaults.
      properties:
        method:
          type: string
          default: GET
          description: "HTTP method to use for the check request"
        expected_statuses:
          type: array
          items:
            type: integer
          description: "Explicit list of acceptable HTTP status codes (takes priority over range)"
          example: [200, 201, 204]
        expected_status_min:
          type: integer
          default: 200
          description: "Lower bound of acceptable status codes (used when expected_statuses is empty)"
        expected_status_max:
          type: integer
          default: 399
          description: "Upper bound of acceptable status codes (used when expected_statuses is empty)"
        headers:
          type: object
          additionalProperties:
            type: string
            maxLength: 4096
          maxProperties: 5
          description: >
            Custom headers sent with each check request (up to 5 key-value pairs).
            Use for Host header override (IP monitoring), content negotiation, or probe identification.
            Do NOT store secrets here — use the credentials API for authentication headers.
          example:
            Host: "api.example.com"
            X-Probe: "pulse"
        follow_redirects:
          type: boolean
          default: false
          description: "Whether to follow HTTP redirects"
        max_redirects:
          type: integer
          default: 10
          description: "Maximum number of redirects to follow (only when follow_redirects is true)"
        skip_tls_verify:
          type: boolean
          default: false
          description: "Disable TLS certificate chain and hostname verification"
        ssl_expiry_threshold:
          type: integer
          minimum: 0
          description: "Minimum acceptable days until certificate expiry (0 = disabled)"
        validate_cert_chain:
          type: boolean
          default: true
          description: "Explicitly validate the full certificate chain against system root CAs"

    DNSSettings:
      type: object
      description: Settings for DNS monitors (type=dns).
      properties:
        record_type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, SRV, SOA, PTR, NS]
          default: A
          description: "DNS record type to query"
        expected_value:
          type: string
          description: "Expected value to find in DNS results (contains semantics)"
        dns_server:
          type: string
          description: "Custom DNS resolver address (host:port, e.g., 8.8.8.8:53)"

    ICMPSettings:
      type: object
      description: Settings for ICMP/Ping monitors (type=icmp).
      properties:
        packet_count:
          type: integer
          minimum: 1
          maximum: 10
          default: 3
          description: "Number of ICMP echo requests to send"
        loss_threshold_percent:
          type: integer
          minimum: 0
          maximum: 100
          default: 100
          description: "Maximum acceptable packet loss percentage before marking as down"
        use_ipv6:
          type: boolean
          default: false
          description: "Use IPv6 (ICMPv6) instead of IPv4"

    SMTPSettings:
      type: object
      description: Settings for SMTP monitors (type=smtp).
      properties:
        port:
          type: integer
          minimum: 1
          maximum: 65535
          default: 25
          description: "SMTP port to connect to"
        starttls:
          type: boolean
          default: true
          description: "Attempt STARTTLS upgrade after EHLO"
        implicit_tls:
          type: boolean
          default: false
          description: "Use implicit TLS (SMTPS) connection, typically on port 465. When true, starttls is ignored since TLS is established before the SMTP greeting."
        ehlo_domain:
          type: string
          default: "pulse.local"
          description: "Domain name to use in EHLO greeting"

    Tag:
      type: object
      description: A key-value tag pair associated with a monitor
      required: [key, value]
      properties:
        key:
          type: string
          description: >
            Tag key. Must be lowercase alphanumeric with hyphens and underscores,
            start with a letter, and not use the reserved `__` prefix.
          pattern: "^[a-z][a-z0-9_-]{0,63}$"
          minLength: 1
          maxLength: 64
        value:
          type: string
          description: Tag value. Printable UTF-8, no control characters.
          minLength: 1
          maxLength: 256

    TagKeysResponse:
      type: object
      description: Response containing distinct tag keys
      required: [data]
      properties:
        data:
          type: array
          items:
            type: string
          description: List of distinct tag keys currently in use

    TagValuesResponse:
      type: object
      description: Response containing distinct values for a tag key
      required: [data]
      properties:
        data:
          type: array
          items:
            type: string
          description: List of distinct values for the specified tag key

    MonitorTagsChangedMessage:
      type: object
      description: >
        WebSocket message broadcast when monitor tags are modified via the API.
        Message type: `monitor_tags_changed`. This is sent as part of the standard
        WebSocket envelope: {"type": "monitor_tags_changed", "payload": {...}}.
        Regular `monitor_status` check messages do NOT include tags.
      required: [monitor_id, tags, timestamp]
      properties:
        monitor_id:
          type: string
          format: uuid
          description: ID of the monitor whose tags changed
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Complete updated tags array for the monitor
        timestamp:
          type: string
          format: date-time
          description: When the tag change occurred

    DashboardSummaryResponse:
      type: object
      description: >
        Aggregated operational health overview for the dashboard. All sections
        are pre-computed server-side to avoid N+1 client requests.
      required:
        - health_score
        - status_distribution
        - active_incidents
        - top_latency_monitors
        - ssl_expiry
        - heatmap
        - recent_events
        - generated_at
      properties:
        health_score:
          $ref: "#/components/schemas/DashboardHealthScore"
        status_distribution:
          $ref: "#/components/schemas/DashboardStatusDistribution"
        active_incidents:
          type: array
          items:
            $ref: "#/components/schemas/DashboardActiveIncident"
          description: Monitors currently in the down state with incident context (max 10)
        top_latency_monitors:
          type: array
          items:
            $ref: "#/components/schemas/DashboardTopLatencyMonitor"
          description: Up to 5 monitors with the highest 24h average latency
        ssl_expiry:
          type: array
          items:
            $ref: "#/components/schemas/DashboardSSLExpiryEntry"
          description: Monitors with SSL certificates expiring within 30 days
        heatmap:
          type: array
          items:
            $ref: "#/components/schemas/DashboardHeatmapHour"
          description: Hourly aggregated state blocks for the last 24 hours
        recent_events:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRecentEvent"
          description: Most recent state transitions across all monitors (max 10)
        generated_at:
          type: string
          format: date-time
          description: Server timestamp when this summary was generated

    DashboardHealthScore:
      type: object
      description: Global uptime percentage computed across all active monitors for the last 24 hours
      required: [uptime_percent, active_monitor_count, partial_data]
      properties:
        uptime_percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Average uptime percentage across all active monitors (0–100, two decimal places)
        active_monitor_count:
          type: integer
          minimum: 0
          description: Number of monitors with status active included in the computation
        partial_data:
          type: boolean
          description: >
            True when stats could not be retrieved for one or more active monitors,
            meaning the health score is computed from a subset of monitors

    DashboardStatusDistribution:
      type: object
      description: Count of monitors in each state
      required: [up, down, unknown, total]
      properties:
        up:
          type: integer
          minimum: 0
          description: Number of monitors currently in the up state
        down:
          type: integer
          minimum: 0
          description: Number of monitors currently in the down state
        unknown:
          type: integer
          minimum: 0
          description: Number of monitors currently in the unknown state
        total:
          type: integer
          minimum: 0
          description: Total number of active monitors (up + down + unknown)

    DashboardActiveIncident:
      type: object
      description: A monitor currently in the down state with incident context
      required: [monitor_id, monitor_name, started_at, state]
      properties:
        monitor_id:
          type: string
          format: uuid
          description: UUID of the affected monitor
        monitor_name:
          type: string
          description: Human-readable name of the monitor
        started_at:
          type: string
          format: date-time
          description: When the incident began (RFC 3339)
        cause:
          type: string
          nullable: true
          description: Last error message that caused the down state
        state:
          type: string
          enum: [down]
          description: Always "down" for active incidents

    DashboardTopLatencyMonitor:
      type: object
      description: A monitor selected for the top-latency sparklines section
      required: [monitor_id, monitor_name, avg_latency_ms]
      properties:
        monitor_id:
          type: string
          format: uuid
          description: UUID of the monitor
        monitor_name:
          type: string
          description: Human-readable name of the monitor
        avg_latency_ms:
          type: integer
          minimum: 0
          description: 24-hour average response latency in milliseconds

    DashboardSSLExpiryEntry:
      type: object
      description: A monitor with an SSL certificate expiring within 30 days
      required: [monitor_id, monitor_name, days_remaining, expires_at]
      properties:
        monitor_id:
          type: string
          format: uuid
          description: UUID of the monitor
        monitor_name:
          type: string
          description: Human-readable name of the monitor
        days_remaining:
          type: integer
          description: Days until the SSL certificate expires (can be negative if already expired)
        expires_at:
          type: string
          format: date-time
          description: Certificate expiration timestamp (RFC 3339)

    DashboardHeatmapHour:
      type: object
      description: Aggregated monitor state for a single hour in the 24-hour heatmap
      required: [hour_start, up_count, down_count, unknown_count]
      properties:
        hour_start:
          type: string
          format: date-time
          description: Start of the hour bucket (RFC 3339, always on the hour boundary)
        up_count:
          type: integer
          minimum: 0
          description: Number of monitors that were up during this hour
        down_count:
          type: integer
          minimum: 0
          description: Number of monitors that were down during this hour
        unknown_count:
          type: integer
          minimum: 0
          description: Number of monitors in unknown state during this hour

    DashboardRecentEvent:
      type: object
      description: A state transition event for a monitor
      required: [monitor_id, monitor_name, from_state, to_state, occurred_at]
      properties:
        monitor_id:
          type: string
          format: uuid
          description: UUID of the monitor that transitioned
        monitor_name:
          type: string
          description: Human-readable name of the monitor
        from_state:
          type: string
          enum: [up, down, unknown]
          description: Previous monitor state before the transition
        to_state:
          type: string
          enum: [up, down, unknown]
          description: New monitor state after the transition
        occurred_at:
          type: string
          format: date-time
          description: When the state transition occurred (RFC 3339)

    ProtoSourceMeta:
      type: object
      description: Metadata about a proto source configured for a monitor
      required: [source_type, filenames, services, created_at, size_bytes]
      properties:
        source_type:
          type: string
          enum: [upload, reflection]
          description: How the proto source was acquired
        filenames:
          type: array
          items:
            type: string
          description: List of .proto filenames or descriptor source identifiers
        services:
          type: array
          items:
            $ref: "#/components/schemas/ProtoService"
          description: Discovered gRPC services and their methods
        created_at:
          type: string
          format: date-time
          description: When the proto source was created or last replaced
        size_bytes:
          type: integer
          description: Size of the stored FileDescriptorSet in bytes

    ProtoService:
      type: object
      description: A gRPC service discovered from proto source
      required: [full_name, methods]
      properties:
        full_name:
          type: string
          description: Fully-qualified service name (e.g., mypackage.MyService)
        methods:
          type: array
          items:
            $ref: "#/components/schemas/ProtoMethod"
          description: Methods available in this service

    ProtoMethod:
      type: object
      description: A method within a gRPC service
      required: [name, full_name, input_type, output_type]
      properties:
        name:
          type: string
          description: Short method name (e.g., GetItem)
        full_name:
          type: string
          description: Full method path (e.g., mypackage.MyService/GetItem)
        input_type:
          type: string
          description: Fully-qualified input message type
        output_type:
          type: string
          description: Fully-qualified output message type

    ProtoMessageSchema:
      type: object
      description: Schema definition for a protobuf message type
      required: [full_name, fields]
      properties:
        full_name:
          type: string
          description: Fully-qualified message type name
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ProtoField"
          description: Fields defined in this message

    ProtoField:
      type: object
      description: A field within a protobuf message
      required: [name, json_name, type, repeated]
      properties:
        name:
          type: string
          description: Proto field name (snake_case)
        json_name:
          type: string
          description: JSON field name (camelCase, as used in Proto JSON)
        type:
          type: string
          description: >
            Field type (e.g., int32, string, bool, bytes, enum, message,
            or fully-qualified message/enum type name)
        repeated:
          type: boolean
          description: Whether this field is a repeated (array) field
        map_key_type:
          type: string
          description: Key type for map fields (e.g., string, int32)
        map_value_type:
          type: string
          description: Value type for map fields
        enum_values:
          type: array
          items:
            type: string
          description: Allowed enum value names (present only for enum-typed fields)
        message_fields:
          type: array
          items:
            $ref: "#/components/schemas/ProtoField"
          description: Nested fields for message-typed fields (recursive)
        comment:
          type: string
          description: Proto source comment associated with this field (if any)

    NotificationChannel:
      type: object
      description: >
        A notification channel (email or webhook). Webhook header values are
        redacted in GET responses.
      required: [id, name, type, config, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          type: string
          enum: [email, webhook]
        config:
          type: object
          description: >
            Type-specific configuration. For email: { recipients: string[] }.
            For webhook: { url, method, body_template, headers: [{name, value}] }.
            Header values are "[REDACTED]" in GET responses.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateNotificationChannelRequest:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Human-readable channel name
        type:
          type: string
          enum: [email, webhook]
          description: Channel type
        config:
          type: object
          description: >
            Type-specific configuration.
            Email: { "recipients": ["addr@example.com"] } (1-50 RFC 5322 addresses, max 254 chars each).
            Webhook: { "url": "https://...", "method": "POST", "body_template": "...", "headers": [{"name": "X-Key", "value": "secret"}] }
            (URL max 2048 chars, http/https only; method: GET/POST/PUT/PATCH/DELETE;
            body_template: valid Go text/template with known variables; headers: 0-20 items,
            name max 128 chars, value max 8192 chars).

    NotificationChannelListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationChannel"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    NotificationBinding:
      type: object
      description: A binding between a notification channel and a monitor with trigger conditions.
      required: [id, channel_id, monitor_id, triggers, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        monitor_id:
          type: string
          format: uuid
        triggers:
          type: array
          items:
            $ref: "#/components/schemas/TriggerCondition"
          minItems: 1
          description: At least one trigger condition is required
        reminder_interval_minutes:
          type: integer
          enum: [5, 10, 15, 30, 60]
          nullable: true
          description: >
            Reminder interval in minutes. When set, recurring reminders are sent
            at this interval while the triggering condition persists. Null means disabled.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateNotificationBindingRequest:
      type: object
      required: [channel_id, triggers]
      properties:
        channel_id:
          type: string
          format: uuid
          description: The notification channel to bind
        triggers:
          type: array
          items:
            $ref: "#/components/schemas/TriggerCondition"
          minItems: 1
          description: At least one trigger condition is required
        reminder_interval_minutes:
          type: integer
          enum: [5, 10, 15, 30, 60]
          nullable: true
          description: Reminder interval in minutes (null to disable)

    UpdateNotificationBindingRequest:
      type: object
      required: [triggers]
      properties:
        triggers:
          type: array
          items:
            $ref: "#/components/schemas/TriggerCondition"
          minItems: 1
          description: At least one trigger condition is required
        reminder_interval_minutes:
          type: integer
          enum: [5, 10, 15, 30, 60]
          nullable: true
          description: Reminder interval in minutes (null to disable)

    TriggerCondition:
      type: object
      description: >
        A trigger condition that determines when a notification fires.
        Additional fields are required depending on the trigger type.
      required: [type]
      properties:
        type:
          type: string
          enum: [monitor_down, monitor_up, degraded, ssl_expiring, n_failures_in_row]
          description: The type of event that triggers the notification
        threshold_ms:
          type: integer
          minimum: 1
          maximum: 60000
          description: Response time threshold in ms (required for type "degraded")
        days_before:
          type: integer
          minimum: 1
          maximum: 365
          description: Days before SSL expiry to trigger (required for type "ssl_expiring")
        count:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of consecutive failures (required for type "n_failures_in_row")

    ReminderPolicy:
      type: object
      description: >
        Configuration for repeating notifications while a triggering condition
        persists. When enabled, reminders are sent at the configured interval
        until the condition resolves.
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Whether reminder notifications are active
        interval_minutes:
          type: integer
          enum: [5, 10, 15, 30, 60]
          description: >
            Interval in minutes between reminder notifications. Required when
            enabled is true.

    NotificationBindingListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationBinding"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    TemplateVariablesResponse:
      type: object
      description: >
        Reference of all available webhook template variables grouped by
        dot-notation prefix.
      required: [groups]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TemplateVariableGroup"

    TemplateVariableGroup:
      type: object
      description: A group of template variables sharing a common prefix.
      required: [name, variables]
      properties:
        name:
          type: string
          description: >
            Group name (dot-notation prefix). Empty string for top-level variables.
          example: "monitor"
        variables:
          type: array
          items:
            $ref: "#/components/schemas/TemplateVariable"

    TemplateVariable:
      type: object
      description: A single template variable available for use in webhook body templates.
      required: [name, type, description, example]
      properties:
        name:
          type: string
          description: Full variable name as used in Go templates (e.g. "monitor.Name")
          example: "monitor.Name"
        type:
          type: string
          description: Go type of the variable
          example: "string"
        description:
          type: string
          description: Human-readable description of what the variable contains
          example: "Monitor display name"
        example:
          type: string
          description: Example value for documentation and testing purposes
          example: "API Health Check"

    TestNotificationResponse:
      type: object
      required: [success, channel_id, channel_type]
      properties:
        success:
          type: boolean
          description: Whether the test notification was delivered successfully
        channel_id:
          type: string
          format: uuid
          description: The channel through which the test was dispatched
        channel_type:
          type: string
          enum: [email, webhook]
          description: The type of channel tested
        error:
          type: string
          description: Error detail if delivery failed (connection error, auth failure, timeout, non-2xx)

    SMTPSettingsRequest:
      type: object
      required: [host, port, from_address]
      properties:
        host:
          type: string
          minLength: 1
          description: SMTP server hostname
          example: "smtp.example.com"
        port:
          type: integer
          minimum: 1
          maximum: 65535
          description: SMTP server port
          example: 587
        username:
          type: string
          nullable: true
          description: SMTP username (optional)
          example: "user@example.com"
        password:
          type: string
          nullable: true
          description: >
            SMTP password (optional). Write-only — never returned by GET.
            If omitted on update, the existing password is preserved.
        from_address:
          type: string
          description: Sender email address (RFC 5322)
          example: "noreply@example.com"
        tls_enabled:
          type: boolean
          default: true
          description: Use implicit TLS (SMTPS) connection

    SMTPSettingsResponse:
      type: object
      required: [configured, password_set]
      properties:
        configured:
          type: boolean
          description: Whether SMTP settings exist
        host:
          type: string
          description: SMTP server hostname (omitted when not configured)
        port:
          type: integer
          description: SMTP server port (omitted when not configured)
        username:
          type: string
          nullable: true
          description: SMTP username (omitted when not configured)
        from_address:
          type: string
          description: Sender email address (omitted when not configured)
        tls_enabled:
          type: boolean
          description: Whether TLS is enabled (omitted when not configured)
        password_set:
          type: boolean
          description: >
            Indicates whether a password is configured. The raw password is
            never returned.

    SMTPTestResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          description: Whether SMTP connectivity test passed
        error:
          type: string
          description: Error detail if test failed (connection, EHLO, or auth failure)

    DeliveryLog:
      type: object
      description: >
        A record of a notification delivery attempt. Each attempt (initial and retries)
        generates a separate log entry for auditability.
      required: [id, channel_id, monitor_id, trigger_type, attempt, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
          description: The notification channel used for delivery
        monitor_id:
          type: string
          format: uuid
          description: The monitor that triggered the notification
        binding_id:
          type: string
          format: uuid
          nullable: true
          description: The binding that matched (nullable if binding was since deleted)
        trigger_type:
          type: string
          enum: [monitor_down, monitor_up, degraded, ssl_expiring, n_failures_in_row]
          description: The trigger condition that caused this notification
        attempt:
          type: integer
          minimum: 1
          description: Attempt number (1 = initial, 2+ = retries)
        status:
          type: string
          enum: [success, failure]
          description: Delivery outcome
        error_detail:
          type: string
          nullable: true
          maxLength: 1024
          description: Error message if delivery failed (truncated to 1024 characters)
        created_at:
          type: string
          format: date-time

    DeliveryLogListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryLog"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
