openapi: 3.0.3
info:
  title: Pulse API
  description: Self-hosted uptime monitoring platform API.
  version: 1.0.0
  contact:
    name: Pulse

servers:
  - url: /api/v1
    description: API v1

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      operationId: login
      summary: Authenticate user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors:
    get:
      operationId: listMonitors
      summary: List all monitors
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: type
          in: query
          description: Filter by monitor type
          schema:
            type: string
            enum: [http, tcp, udp, websocket, grpc]
        - name: tag
          in: query
          description: >
            Filter by tags in key:value format. Multiple tag parameters use AND semantics
            (monitor must have ALL specified tags). Example: ?tag=env:prod&tag=team:infra
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: Paginated list of monitors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMonitor
      summary: Create a new monitor
      tags: [Monitors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorRequest"
            example:
              name: "gRPC Health Check"
              type: "grpc"
              target: "grpc.example.com:443"
              interval_seconds: 30
              timeout_seconds: 10
              settings:
                service_method: "grpc.health.v1.Health/Check"
                tls_mode: "tls"
                ssl_expiry_threshold: 30
                metadata:
                  authorization: "Bearer token123"
                expected_statuses: [0]
      responses:
        "201":
          description: Monitor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}:
    get:
      operationId: getMonitor
      summary: Get a monitor by ID
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "200":
          description: Monitor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: putMonitor
      summary: Create or update a monitor (idempotent)
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutMonitorRequest"
      responses:
        "200":
          description: Monitor created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteMonitor
      summary: Delete a monitor
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "204":
          description: Monitor deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/history:
    get:
      operationId: getMonitorHistory
      summary: Get check history for a monitor
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - name: from
          in: query
          description: Start of time range (RFC 3339). Defaults to 24h ago.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of time range (RFC 3339). Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Check history points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /monitors/{id}/incidents:
    get:
      operationId: listMonitorIncidents
      summary: List incidents for a specific monitor
      tags: [Incidents]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of incidents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/stats:
    get:
      operationId: getMonitorStats
      summary: Get uptime statistics, SSL info, and last error for a monitor
      tags: [Monitors]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "200":
          description: Monitor statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorStatsResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monitors/{id}/credentials:
    post:
      operationId: createMonitorCredential
      summary: Create a credential for a monitor
      description: >
        Creates a new authentication credential for the specified monitor.
        The credential value is encrypted at rest and never returned in subsequent API responses.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorCredentialRequest"
      responses:
        "201":
          description: Credential created (secret values not returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorCredential"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listMonitorCredentials
      summary: List credentials for a monitor
      description: >
        Returns metadata for all credentials associated with the specified monitor.
        Secret values are never included in the response.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
      responses:
        "200":
          description: List of credential metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorCredentialListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /monitors/{id}/credentials/{credentialId}:
    put:
      operationId: updateMonitorCredential
      summary: Update a monitor credential
      description: >
        Updates an existing credential. Only the provided fields are updated.
        The new secret value is encrypted at rest and never returned in the response.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/CredentialID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonitorCredentialRequest"
      responses:
        "200":
          description: Credential updated (secret values not returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorCredential"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMonitorCredential
      summary: Delete a monitor credential
      description: >
        Permanently removes a credential from the monitor. The monitor will stop
        including this credential's authentication in subsequent health-check requests.
      tags: [Credentials]
      parameters:
        - $ref: "#/components/parameters/MonitorID"
        - $ref: "#/components/parameters/CredentialID"
      responses:
        "204":
          description: Credential deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tags:
    get:
      operationId: listTagKeys
      summary: List all distinct tag keys
      description: Returns all distinct tag keys currently in use across all monitors. Used for frontend autocomplete.
      tags: [Tags]
      responses:
        "200":
          description: List of distinct tag keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagKeysResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tags/{key}:
    get:
      operationId: listTagValues
      summary: List distinct values for a tag key
      description: Returns all distinct values associated with the specified tag key across all monitors. Used for frontend autocomplete.
      tags: [Tags]
      parameters:
        - name: key
          in: path
          required: true
          description: Tag key to list values for
          schema:
            type: string
            pattern: "^[a-z][a-z0-9_-]{0,63}$"
      responses:
        "200":
          description: List of distinct values for the tag key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagValuesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /incidents:
    get:
      operationId: listIncidents
      summary: List all incidents
      tags: [Incidents]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          description: Filter by status (open for unresolved only)
          schema:
            type: string
            enum: [open]
      responses:
        "200":
          description: Paginated list of incidents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tokens:
    get:
      operationId: listTokens
      summary: List API tokens
      tags: [Tokens]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createToken
      summary: Create a new API token (raw value returned once)
      tags: [Tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token created (raw value shown only at creation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /tokens/{id}:
    delete:
      operationId: revokeToken
      summary: Revoke an API token
      tags: [Tokens]
      parameters:
        - $ref: "#/components/parameters/TokenID"
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or API Token

  parameters:
    Page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Items per page (max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    MonitorID:
      name: id
      in: path
      required: true
      description: Monitor UUID
      schema:
        type: string
        format: uuid
    CredentialID:
      name: credentialId
      in: path
      required: true
      description: Credential UUID
      schema:
        type: string
        format: uuid
    TokenID:
      name: id
      in: path
      required: true
      description: Token UUID
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: >
                Machine-readable error code. Known codes include:
                INVALID_TAGS - tag validation failed (invalid key format, value too long,
                too many tags, duplicate key-value pairs, or reserved prefix usage)
            message:
              type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, expires_at]
      properties:
        token:
          type: string
          description: JWT token
        expires_at:
          type: string
          format: date-time

    Monitor:
      type: object
      required:
        - id
        - name
        - type
        - target
        - interval_seconds
        - timeout_seconds
        - status
        - state
        - settings
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [http, tcp, udp, websocket, grpc]
        target:
          type: string
        interval_seconds:
          type: integer
        timeout_seconds:
          type: integer
        status:
          type: string
          enum: [active, paused]
        state:
          type: string
          enum: [up, down, unknown]
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        next_check_at:
          type: string
          format: date-time
          nullable: true
        settings:
          type: object
          description: "Type-specific settings. For type=grpc, see GRPCSettings schema."
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Key-value tags associated with this monitor
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMonitorRequest:
      type: object
      required: [name, type, target]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [http, tcp, udp, websocket, grpc]
        target:
          type: string
        interval_seconds:
          type: integer
          default: 60
        timeout_seconds:
          type: integer
          default: 10
        status:
          type: string
          enum: [active, paused]
          default: active
        settings:
          type: object
          description: "Type-specific settings. For type=grpc, see GRPCSettings schema."
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Optional key-value tags to associate with the monitor (max 20)

    PutMonitorRequest:
      type: object
      required: [name, type, target]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [http, tcp, udp, websocket, grpc]
        target:
          type: string
        interval_seconds:
          type: integer
          default: 60
        timeout_seconds:
          type: integer
          default: 10
        status:
          type: string
          enum: [active, paused]
          default: active
        settings:
          type: object
          description: "Type-specific settings. For type=grpc, see GRPCSettings schema."
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Optional key-value tags to associate with the monitor (max 20)

    MonitorListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Monitor"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    HistoryPoint:
      type: object
      required: [state, checked_at]
      properties:
        state:
          type: string
          enum: [up, down]
        latency_ms:
          type: integer
          nullable: true
        status_code:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true
        ssl_days_remaining:
          type: integer
          nullable: true
          description: Days until SSL certificate expires (HTTPS monitors only)
        checked_at:
          type: string
          format: date-time

    HistoryResponse:
      type: object
      required: [monitor_id, from, to, points]
      properties:
        monitor_id:
          type: string
          format: uuid
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        points:
          type: array
          items:
            $ref: "#/components/schemas/HistoryPoint"

    Incident:
      type: object
      required: [id, monitor_id, started_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        monitor_id:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        cause:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    IncidentListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Incident"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    MonitorCredential:
      type: object
      description: >
        Credential metadata for a monitor. Secret values (token, password, header_value,
        encrypted_value) are never included in API responses.
      required: [id, auth_type, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        auth_type:
          type: string
          enum: [bearer, basic, header]
          description: The type of authentication this credential provides
        name:
          type: string
          description: Human-readable label for the credential
        header_name:
          type: string
          nullable: true
          description: Custom header name (only present when auth_type is header)
        username:
          type: string
          nullable: true
          description: Username for basic auth (only present when auth_type is basic)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMonitorCredentialRequest:
      type: object
      required: [auth_type, name]
      properties:
        auth_type:
          type: string
          enum: [bearer, basic, header]
          description: The type of authentication this credential provides
        name:
          type: string
          description: Human-readable label for the credential
        token:
          type: string
          description: Bearer token value (required when auth_type is bearer)
        username:
          type: string
          description: Username for basic auth (required when auth_type is basic)
        password:
          type: string
          description: Password for basic auth (required when auth_type is basic)
        header_name:
          type: string
          description: Custom header name (required when auth_type is header)
        header_value:
          type: string
          description: Custom header value (required when auth_type is header)

    UpdateMonitorCredentialRequest:
      type: object
      properties:
        name:
          type: string
          description: Updated human-readable label for the credential
        token:
          type: string
          description: New bearer token value (for auth_type bearer)
        username:
          type: string
          description: New username for basic auth (for auth_type basic)
        password:
          type: string
          description: New password for basic auth (for auth_type basic)
        header_name:
          type: string
          description: New custom header name (for auth_type header)
        header_value:
          type: string
          description: New custom header value (for auth_type header)

    MonitorCredentialListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MonitorCredential"

    Token:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        expires_at:
          type: string
          format: date-time

    CreateTokenResponse:
      type: object
      required: [token, id, name, created_at]
      properties:
        token:
          type: string
          description: Raw token value (shown only once)
        id:
          type: string
          format: uuid
        name:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    TokenListResponse:
      type: object
      required: [data, total, page, limit, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Token"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    MonitorStatsResponse:
      type: object
      required: [monitor_id, uptime_24h, uptime_30d]
      properties:
        monitor_id:
          type: string
          format: uuid
        uptime_24h:
          $ref: "#/components/schemas/UptimeWindowStats"
        uptime_30d:
          $ref: "#/components/schemas/UptimeWindowStats"
        ssl:
          $ref: "#/components/schemas/SSLInfo"
        last_error:
          $ref: "#/components/schemas/LastErrorInfo"

    UptimeWindowStats:
      type: object
      required: [total_checks, up_checks, uptime_percent, avg_latency_ms]
      properties:
        total_checks:
          type: integer
        up_checks:
          type: integer
        uptime_percent:
          type: number
          format: float
        avg_latency_ms:
          type: integer

    SSLInfo:
      type: object
      required: [days_remaining, expires_at]
      properties:
        days_remaining:
          type: integer
          description: Days until certificate expires
        expires_at:
          type: string
          format: date
          description: Approximate certificate expiration date

    LastErrorInfo:
      type: object
      required: [error, checked_at]
      properties:
        error:
          type: string
          description: The error message from the last failed check
        checked_at:
          type: string
          format: date-time
          description: When the error was recorded

    GRPCSettings:
      type: object
      required: [service_method, tls_mode]
      properties:
        service_method:
          type: string
          description: "Fully-qualified gRPC service and method in package.Service/Method format"
          example: "grpc.health.v1.Health/Check"
          maxLength: 512
        tls_mode:
          type: string
          enum: [plaintext, tls, tls_skip_verify]
          description: "Connection security mode"
        ssl_expiry_threshold:
          type: integer
          minimum: 1
          maximum: 3650
          description: "Minimum acceptable days until certificate expiry"
        metadata:
          type: object
          additionalProperties:
            type: string
            maxLength: 4096
          maxProperties: 20
          description: "Key-value pairs sent as gRPC request metadata"
        expected_statuses:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 16
          maxItems: 17
          description: "gRPC status codes considered healthy (default: [0] = OK)"
        request_payload:
          type: string
          format: byte
          maxLength: 65536
          description: "Base64-encoded protobuf request message"

    Tag:
      type: object
      description: A key-value tag pair associated with a monitor
      required: [key, value]
      properties:
        key:
          type: string
          description: >
            Tag key. Must be lowercase alphanumeric with hyphens and underscores,
            start with a letter, and not use the reserved `__` prefix.
          pattern: "^[a-z][a-z0-9_-]{0,63}$"
          minLength: 1
          maxLength: 64
        value:
          type: string
          description: Tag value. Printable UTF-8, no control characters.
          minLength: 1
          maxLength: 256

    TagKeysResponse:
      type: object
      description: Response containing distinct tag keys
      required: [data]
      properties:
        data:
          type: array
          items:
            type: string
          description: List of distinct tag keys currently in use

    TagValuesResponse:
      type: object
      description: Response containing distinct values for a tag key
      required: [data]
      properties:
        data:
          type: array
          items:
            type: string
          description: List of distinct values for the specified tag key

    MonitorTagsChangedMessage:
      type: object
      description: >
        WebSocket message broadcast when monitor tags are modified via the API.
        Message type: `monitor_tags_changed`. This is sent as part of the standard
        WebSocket envelope: {"type": "monitor_tags_changed", "payload": {...}}.
        Regular `monitor_status` check messages do NOT include tags.
      required: [monitor_id, tags, timestamp]
      properties:
        monitor_id:
          type: string
          format: uuid
          description: ID of the monitor whose tags changed
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Complete updated tags array for the monitor
        timestamp:
          type: string
          format: date-time
          description: When the tag change occurred
