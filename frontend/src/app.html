<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('pulse-theme-mode');
          var theme;
          if (mode === 'light' || mode === 'dark') {
            theme = mode;
          } else if (mode === 'system' || !mode) {
            // 'system' or no mode stored — check legacy key then fall back to OS
            var legacy = localStorage.getItem('pulse-theme');
            if (!mode && (legacy === 'light' || legacy === 'dark')) {
              theme = legacy;
            } else {
              theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          var theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
