services:
  backend:
    image: golang:1.25
    container_name: pulse-backend-dev
    working_dir: /workspace/backend
    cap_add:
      - NET_RAW
    command: ["sh", "-c", "go mod download && go run ./cmd/pulse"]
    environment:
      PULSE_PORT: "8080"
      PULSE_DEV: "true"
      PULSE_SCHEDULER_WORKERS: "50"
      PULSE_OPENAPI_DIR: "/workspace/backend/api"
      DATABASE_URL: "postgres://pulse:pulse@postgres:5432/pulse?sslmode=disable"
      PULSE_SECRET_KEY: "cHVsc2UtZGV2LXNlY3JldC1rZXktMDEyMzQ1Njc4OTA="
      PULSE_JWT_SECRET: "pulse-dev-jwt-secret-change-in-production"
      PULSE_JWT_EXPIRY: "24h"
      PULSE_BASE_URL: "http://localhost:5173"
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:lts-alpine
    container_name: pulse-frontend-dev
    working_dir: /app
    command: ["sh", "-c", "corepack enable && pnpm install && pnpm dev --host"]
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8080"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: pulse-postgres-dev
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse-postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pulse-postgres-dev-data:
  frontend_node_modules:
