version: "3.9"

services:
  backend:
    image: golang:1.22
    container_name: pulse-backend-dev
    working_dir: /workspace/backend
    command: ["sh", "-c", "go mod download && go run ./cmd/pulse"]
    environment:
      PULSE_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: pulse-postgres-dev
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse-postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  influxdb:
    image: influxdb:2.7
    container_name: pulse-influxdb-dev
    ports:
      - "8086:8086"
    volumes:
      - pulse-influxdb-dev-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pulse-postgres-dev-data:
  pulse-influxdb-dev-data:
