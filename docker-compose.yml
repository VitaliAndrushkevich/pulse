services:
  pulse:
    build:
      context: .
      dockerfile: Dockerfile
    image: pulse:local
    container_name: pulse
    environment:
      PULSE_PORT: "8080"
      PULSE_DEV: "true"
      PULSE_OPENAPI_DIR: "/app/api"
      DATABASE_URL: "postgres://pulse:pulse@postgres:5432/pulse?sslmode=disable"
      # 32 random bytes, base64-encoded. Generate with:
      #   openssl rand -base64 32
      PULSE_SECRET_KEY: "cHVsc2UtZGV2LXNlY3JldC1rZXktMDEyMzQ1Njc4OTA="
      PULSE_JWT_SECRET: "pulse-dev-jwt-secret-change-in-production"
    ports:
      - "8080:8080"
    volumes:
      - ./backend/api:/app/api:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: pulse-postgres
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pulse-postgres-data:
